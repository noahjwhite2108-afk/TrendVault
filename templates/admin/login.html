{% extends "base.html" %}

{% block title %}Admin Login - {{ store.name }}{% endblock %}

{% block content %}
<div class="container admin-login-container">
    <div class="login-card">
        <h1>Admin Login</h1>
        <p class="login-subtitle">Enter your password to access the admin panel</p>

        <form method="POST" class="login-form">
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required class="form-control" autofocus>
            </div>
            <button type="submit" class="btn btn-primary btn-block">Login</button>
        </form>

        <div class="login-footer">
            <p><a href="{{ url_for('index') }}">Back to Store</a></p>
        </div>
    </div>
</div>
{% endblock %}
